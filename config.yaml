# 旅行创收助手 - 技能配置

# 技能基本信息
skill:
  name: 旅行创收助手
  version: 1.0.0
  description: 发现边玩边赚钱的旅行方案，让预算有限的人也能说走就走
  author: 徐文祥（出心）
  department: 飞猪 -CTO 线 - 设计部 - 用户研究
  email: wenxiang.xwx@alibaba-inc.com

# 触发配置
trigger:
  # 触发关键词（用户说这些词时唤起技能）
  keywords:
    - 旅行赚钱
    - 边玩边赚
    - 旅行创收
    - 赚旅费
    - 旅行副业
    - 演唱会周边
    - 旅拍
    - 免税代购
    - 酒店试睡员
    - 怎么覆盖旅费
    - 旅行怎么赚钱
    - 旅行兼职
    - 预算不够怎么旅行
  
  # 触发问题（用户问这些问题时唤起技能）
  questions:
    - 有什么旅行方式可以赚钱
    - 怎么边旅行边创收
    - 预算不够怎么旅行
    - 旅行时能做什么兼职
    - 演唱会卖周边能赚多少钱
    - 我会 XX 技能，旅行时能怎么赚钱
    - 推荐几个旅行赚钱的方法

# 功能配置
features:
  # 核心功能
  core:
    - 机会发现：扫描全网活动/赛事/展会，识别创收机会
    - 收益测算：基于历史数据预测收入，计算净收益
    - 个性化匹配：技能×预算×时间 三维匹配推荐
    - 执行计划：生成倒计时任务清单
  
  # AI 支持
  ai_support:
    - 获客文案生成
    - 海报设计
    - 客服话术
    - 风险提示

# 数据配置
data:
  # 玩法库
  opportunities:
    total: 100
    categories:
      - 活动套利 (15 种)
      - 技能变现 (60 种)
      - 内容创作 (8 种)
      - 资源变现 (5 种)
      - 信息差变现 (2 种)
      - 季节性工作 (10 种)
  
  # 技能库
  skills:
    total: 27
    list:
      - 摄影、视频制作、内容创作、平面设计、翻译、教学、咨询
      - 导游讲解、户外领队、美食探店、活动主持、文案写作
      - 社交媒体运营、数据分析、市场调研、活动策划、手工制作
      - 音乐表演、艺术创作、运动教练、潜水指导、滑雪教练
      - 瑜伽教学、摄影后期、视频剪辑、直播带货、代购服务
  
  # 城市库
  cities:
    total: 50+
    tier1: 北京、上海、广州、深圳
    tier2: 杭州、南京、苏州、成都、重庆、武汉、西安、长沙
    tourist: 青岛、厦门、三亚、丽江、大理、拉萨、哈尔滨

# 风险合规
compliance:
  warnings:
    - 场馆周边售卖可能涉及城管/安保
    - 代购需注意海关限额
    - 票务倒卖需合规操作
    - 内容创作注意版权
  
  disclaimers:
    - 收益预测仅供参考，实际收益可能不同
    - 建议用户自行评估风险
    - 本工具不提供法律/税务建议
    - 用户需自行承担所有风险

# 推荐策略
recommendation:
  # 权重配置
  weights:
    skill_match: 0.4      # 技能匹配度
    budget_match: 0.3     # 预算匹配度
    time_match: 0.2       # 时间匹配度
    risk_level: 0.1       # 风险等级
  
  # 过滤规则
  filters:
    min_roi: 1.5          # 最低投资回报率
    max_risk: high        # 最高风险等级
    min_income: 1000      # 最低收益（元）

# 迭代计划
roadmap:
  phase1:
    name: 创意验证
    time: 2026-04
    status: completed
    tasks:
      - 创意文档完成
      - 用户访谈验证
      - Mockup 设计
      - 100 种玩法清单
      - FlyAI Hackathon 提交
  
  phase2:
    name: MVP 开发
    time: 2026-05
    status: planned
    tasks:
      - FlyAI Skill 开发
      - 接入基础数据源
      - 收益测算算法
      - 执行计划生成
      - 1D Demo 应用完善
  
  phase3:
    name: 社区建设
    time: 2026-06
    status: planned
    tasks:
      - 用户案例分享
      - 机会池 UGC
      - 组队功能
      - 评价系统
      - 创作者认证
  
  phase4:
    name: 商业化
    time: 2026-07+
    status: planned
    tasks:
      - 会员体系
      - 付费课程
      - 品牌合作
      - 保险服务
      - 金融服务
